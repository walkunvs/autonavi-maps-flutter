name: PR Comment Report

on:
  workflow_run:
    workflows: ["PR Build & Report"]
    types: [completed]

# Runs in base repo context — has write permission regardless of fork
permissions:
  pull-requests: write
  actions: read

jobs:
  comment:
    name: Post Build Comment
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: /tmp/artifacts

      - name: Post or update PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            // Read PR number and head SHA
            const prNumber = parseInt(
              fs.readFileSync('/tmp/artifacts/pr-info/pr_number', 'utf8').trim()
            );
            const headSha = fs.readFileSync('/tmp/artifacts/pr-info/head_sha', 'utf8').trim();

            // Read job results
            const read = (p) => { try { return fs.readFileSync(p, 'utf8').trim(); } catch { return 'skipped'; } };
            const results = {
              analyze:             read('/tmp/artifacts/job-results/analyze'),
              integration_ios:     read('/tmp/artifacts/job-results/integration_ios'),
              integration_android: read('/tmp/artifacts/job-results/integration_android'),
            };

            const icon = s => s === 'success' ? '✅' : s === 'failure' ? '❌' : s === 'skipped' ? '⏭️' : '⚠️';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.payload.workflow_run.id}`;

            // Build comment body
            let body = `<!-- ci-build-report -->\n## CI Build Report\n\n`;
            body += `| Job | Status |\n|-----|--------|\n`;
            body += `| Flutter Analyze                     | ${icon(results.analyze)}             ${results.analyze} |\n`;
            body += `| Integration Tests (iOS Simulator)   | ${icon(results.integration_ios)}     ${results.integration_ios} |\n`;
            body += `| Integration Tests (Android Emulator)| ${icon(results.integration_android)} ${results.integration_android} |\n\n`;

            // Append error logs for failed jobs
            const failedJobs = [
              { label: 'Flutter Analyze',             status: results.analyze,             logFile: '/tmp/artifacts/log-analyze/analyze.log' },
              { label: 'Integration Tests (iOS)',      status: results.integration_ios,     logFile: '/tmp/artifacts/log-integration-ios/integration-ios.log' },
              { label: 'Integration Tests (Android)',  status: results.integration_android, logFile: '/tmp/artifacts/log-integration-android/integration-android.log' },
            ].filter(j => j.status === 'failure');

            if (failedJobs.length > 0) {
              body += `---\n### Error Details\n\n`;
              for (const j of failedJobs) {
                body += `<details>\n<summary>❌ ${j.label} — last 100 lines</summary>\n\n\`\`\`\n`;
                try {
                  const lines = fs.readFileSync(j.logFile, 'utf8').split('\n');
                  body += lines.slice(-100).join('\n');
                } catch {
                  body += '(log not available)';
                }
                body += `\n\`\`\`\n</details>\n\n`;
              }
            } else {
              body += `> ✅ All checks passed!\n\n`;
            }

            // Golden screenshot diff reports (informational, never blocks the PR)
            const goldenReports = [
              { label: 'iOS',     file: '/tmp/artifacts/golden-report-ios/golden-report-ios.txt' },
              { label: 'Android', file: '/tmp/artifacts/golden-report-android/golden-report-android.txt' },
            ];
            const goldenSections = [];
            for (const r of goldenReports) {
              let reportText = '';
              try { reportText = fs.readFileSync(r.file, 'utf8').trim(); } catch { continue; }
              if (!reportText) continue;
              const lines = reportText.split('\n');
              const exitLine = lines.find(l => l.startsWith('exit_code='));
              const exitCode = exitLine ? parseInt(exitLine.split('=')[1]) : 0;
              const reportBody = lines.filter(l => !l.startsWith('exit_code=')).join('\n').trim();
              const statusIcon = exitCode === 0 ? '✅' : '⚠️';
              goldenSections.push(
                `<details>\n<summary>${statusIcon} Screenshot diff — ${r.label}</summary>\n\n\`\`\`\n${reportBody}\n\`\`\`\n` +
                (exitCode !== 0 ? `\n[View diff images](${runUrl})\n` : '') +
                `</details>`
              );
            }
            if (goldenSections.length > 0) {
              body += `---\n### Screenshot Comparison _(informational — does not block merge)_\n\n`;
              body += goldenSections.join('\n\n') + '\n\n';
            }

            // Link to screenshots artifacts
            if (results.integration_ios !== 'skipped') {
              body += `📸 [iOS screenshots](${runUrl})  `;
            }
            if (results.integration_android !== 'skipped') {
              body += `📸 [Android screenshots](${runUrl})\n`;
            }
            body += `\n**Commit:** ${headSha.slice(0, 7)} | **Run:** [${context.payload.workflow_run.id}](${runUrl})`;

            // Find existing comment and update, or create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('<!-- ci-build-report -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
