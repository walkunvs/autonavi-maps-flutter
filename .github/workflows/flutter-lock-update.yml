name: Update Flutter Lock Files

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Flutter version (e.g., 3.27.4 or 3.32.0)'
        required: true
        default: '3.27.4'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-locks:
    name: Generate Lock Files (macOS)
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter ${{ inputs.flutter_version }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: 'stable'
          cache: true

      - name: Setup Java (for Android tooling)
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Print Flutter version
        run: flutter --version

      # ── Dart / Flutter pub ──────────────────────────────────────────────
      - name: Install Melos
        run: dart pub get

      - name: Melos bootstrap (generates all pubspec.lock files)
        run: dart run melos bootstrap

      # ── iOS: CocoaPods ──────────────────────────────────────────────────
      - name: Install CocoaPods
        run: sudo gem install cocoapods --no-document

      - name: Flutter pub get in example (needed before pod install)
        run: flutter pub get
        working-directory: example

      - name: Create example platform files (android + ios)
        run: flutter create . --platforms android,ios
        working-directory: example

      - name: Pod install (generates example/ios/Podfile.lock)
        run: pod install
        working-directory: example/ios

      # ── Android: resolve Gradle dependencies ────────────────────────────
      - name: Resolve Android Gradle dependencies
        run: ./gradlew dependencies --configuration releaseRuntimeClasspath --no-daemon -q || true
        working-directory: example/android

      # ── Create PR with all lock files ───────────────────────────────────
      # Uses PAT_TOKEN secret if available (needed when repo settings restrict
      # GITHUB_TOKEN from creating PRs). To enable: add a PAT with repo scope
      # as a repository secret named PAT_TOKEN, OR enable
      # "Allow GitHub Actions to create and approve pull requests" in
      # Settings > Actions > General > Workflow permissions.
      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          branch: chore/lock-files-flutter-${{ inputs.flutter_version }}
          commit-message: "chore: update lock files for Flutter ${{ inputs.flutter_version }}"
          title: "chore: update lock files for Flutter ${{ inputs.flutter_version }}"
          body: |
            ## Lock File Update

            Automatically generated by the **Update Flutter Lock Files** workflow.

            | Item | Details |
            |------|---------|
            | Flutter version | `${{ inputs.flutter_version }}` |
            | Triggered by | @${{ github.actor }} |
            | Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            ### Changed files
            - `pubspec.lock` (root workspace)
            - `packages/*/pubspec.lock` (each package)
            - `example/pubspec.lock`
            - `example/android/` (platform project files + Gradle)
            - `example/ios/` (platform project files + Podfile.lock)

            > Review the dependency changes before merging.
          add-paths: |
            pubspec.lock
            packages/**/pubspec.lock
            example/pubspec.lock
            example/android
            example/ios
          labels: |
            dependencies
            automated
          delete-branch: true

      - name: PR creation summary
        if: always()
        run: |
          if [ -n "${{ steps.create-pr.outputs.pull-request-url }}" ]; then
            echo "### Pull Request Created" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**URL:** ${{ steps.create-pr.outputs.pull-request-url }}" >> $GITHUB_STEP_SUMMARY
          else
            BRANCH="chore/lock-files-flutter-${{ inputs.flutter_version }}"
            echo "### Lock files committed to branch" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Branch \`${BRANCH}\` was pushed but PR creation was skipped (no changes or insufficient token permissions)." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**To create the PR manually:**" >> $GITHUB_STEP_SUMMARY
            echo "${{ github.server_url }}/${{ github.repository }}/compare/${BRANCH}?expand=1" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Or enable PR creation via Actions:** Settings → Actions → General → Workflow permissions → ✅ Allow GitHub Actions to create and approve pull requests" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Or add a PAT:** Create a token with \`repo\` scope and save it as repository secret \`PAT_TOKEN\`." >> $GITHUB_STEP_SUMMARY
          fi
