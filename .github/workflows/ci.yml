name: CI

on:
  push:
    branches: [main, develop]
  # pull_request CI is handled by pr-build-report.yml which also writes
  # error reports back to the PR branch. Keep this workflow for push only.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Analyze + unit tests — runs on every push to main/develop so that commits
  # that land outside of a PR (e.g. direct pushes or PRs targeting develop)
  # are still validated. pr-build-report.yml covers PRs to main only.
  # ───────────────────────────────────────────────────────────────────────────
  analyze_and_test:
    name: Analyze & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Melos bootstrap
        run: dart pub get && dart run melos bootstrap

      - name: Flutter analyze
        run: dart run melos exec -- "flutter analyze --no-fatal-infos"

      - name: Format check
        run: dart run melos exec -- "dart format --set-exit-if-changed ."

      - name: Unit tests
        run: dart run melos exec -- "flutter test"

  # Build (analyze + android/ios build) is handled by pr-build-report.yml
  # on every PR. This workflow also runs integration tests after merge to main,
  # avoiding duplicate work and keeping PR feedback fast.

  # ───────────────────────────────────────────────────────────────────────────
  # iOS Simulator integration tests + golden screenshot regression
  #
  # Runs on macos-14 (Apple Silicon) because iOS Simulator requires macOS.
  # Screenshots are captured and compared against goldens in golden/.
  # ───────────────────────────────────────────────────────────────────────────
  integration_test_ios:
    name: Integration Tests (iOS Simulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub get && dart run melos bootstrap

      - name: Pod Install
        run: pod install
        working-directory: example/ios

      - name: Create and boot iOS Simulator
        run: |
          # List available runtimes to pick a valid one.
          RUNTIME=$(xcrun simctl list runtimes --json \
            | python3 -c "
          import sys, json
          runtimes = json.load(sys.stdin)['runtimes']
          ios = [r for r in runtimes if r.get('isAvailable') and 'iOS' in r.get('name','')]
          print(ios[-1]['identifier'] if ios else '')
          ")
          if [ -z "$RUNTIME" ]; then
            echo "No available iOS runtime found" && exit 1
          fi
          UDID=$(xcrun simctl create "IntegrationTestDevice" "iPhone 15" "$RUNTIME")
          xcrun simctl boot "$UDID"
          # Wait for the simulator to finish booting.
          xcrun simctl bootstatus "$UDID" -b
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Run integration tests on iOS Simulator
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/map_rendering_test.dart \
            --device-id "$SIM_UDID" \
            --dart-define=AMAP_IOS_KEY=${{ secrets.AMAP_IOS_KEY }}
        working-directory: example
        env:
          SIM_UDID: ${{ env.SIM_UDID }}

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: ios-map-screenshots
          path: example/integration_test/screenshots/
          if-no-files-found: warn

      - name: Compare screenshots against goldens (Layer 3)
        if: always()
        run: |
          pip install pillow --break-system-packages
          python scripts/golden_diff.py \
            example/integration_test/golden/ios \
            example/integration_test/screenshots \
            --threshold 2.0 \
            --diff-dir example/integration_test/diffs

      - name: Upload diff images on failure
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: ios-golden-diffs
          path: example/integration_test/diffs/
          if-no-files-found: ignore

      - name: Shutdown simulator
        if: always()
        run: |
          if [ -n "$SIM_UDID" ]; then
            xcrun simctl shutdown "$SIM_UDID" || true
            xcrun simctl delete "$SIM_UDID" || true
          fi
        env:
          SIM_UDID: ${{ env.SIM_UDID }}

  # ───────────────────────────────────────────────────────────────────────────
  # Android Emulator integration tests
  #
  # Runs on macos-14 (Apple Silicon) so we can use an arm64-v8a emulator.
  # The AMap 3dmap SDK ships ARM-only native libraries (.so); x86_64 emulators
  # on ubuntu-latest cannot load them, producing a blank map on every test.
  # Apple Silicon Macs run arm64-v8a emulators natively via Hypervisor.framework
  # (no KVM needed), so AMap JNI initialization succeeds.
  # ───────────────────────────────────────────────────────────────────────────
  integration_test_android:
    name: Integration Tests (Android Emulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub get && dart run melos bootstrap

      - name: Run integration tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: arm64-v8a
          profile: Nexus 6
          script: cd example && flutter drive --driver=test_driver/integration_test.dart --target=integration_test/map_rendering_test.dart -d emulator-5554 "--dart-define=AMAP_ANDROID_KEY=${{ secrets.AMAP_ANDROID_KEY }}"

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: android-map-screenshots
          path: example/integration_test/screenshots/
          if-no-files-found: warn

      - name: Compare screenshots against goldens (Layer 3)
        if: always()
        run: |
          pip install pillow --break-system-packages
          python scripts/golden_diff.py \
            example/integration_test/golden/android \
            example/integration_test/screenshots \
            --threshold 2.0 \
            --diff-dir example/integration_test/diffs

      - name: Upload diff images on failure
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: android-golden-diffs
          path: example/integration_test/diffs/
          if-no-files-found: ignore

  # ───────────────────────────────────────────────────────────────────────────
  # Seed golden baselines
  #
  # Runs after both integration test jobs.  When a platform's golden/ subdir
  # contains no PNG files (first-ever run), the screenshots produced by that
  # platform's job are downloaded and committed as the new baseline.
  # Subsequent CI runs compare against those committed goldens instead of
  # silently skipping.
  # ───────────────────────────────────────────────────────────────────────────
  seed_goldens:
    name: Seed Golden Baselines
    runs-on: ubuntu-latest
    needs: [integration_test_ios, integration_test_android]
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Check for existing golden PNGs
        id: check
        run: |
          IOS_COUNT=$(find example/integration_test/golden/ios -name "*.png" 2>/dev/null | wc -l | tr -d ' ')
          ANDROID_COUNT=$(find example/integration_test/golden/android -name "*.png" 2>/dev/null | wc -l | tr -d ' ')
          echo "ios_count=$IOS_COUNT" >> "$GITHUB_OUTPUT"
          echo "android_count=$ANDROID_COUNT" >> "$GITHUB_OUTPUT"
          echo "iOS goldens: $IOS_COUNT  Android goldens: $ANDROID_COUNT"

      - name: Download iOS screenshots
        if: steps.check.outputs.ios_count == '0'
        uses: actions/download-artifact@v4
        with:
          name: ios-map-screenshots
          path: /tmp/ios-screenshots/
        continue-on-error: true

      - name: Download Android screenshots
        if: steps.check.outputs.android_count == '0'
        uses: actions/download-artifact@v4
        with:
          name: android-map-screenshots
          path: /tmp/android-screenshots/
        continue-on-error: true

      - name: Commit seeded goldens
        run: |
          CHANGED=false

          if [ "${{ steps.check.outputs.ios_count }}" = "0" ] && \
             ls /tmp/ios-screenshots/*.png 2>/dev/null | head -1 > /dev/null; then
            cp /tmp/ios-screenshots/*.png example/integration_test/golden/ios/
            echo "Seeded $(ls /tmp/ios-screenshots/*.png | wc -l | tr -d ' ') iOS goldens."
            CHANGED=true
          fi

          if [ "${{ steps.check.outputs.android_count }}" = "0" ] && \
             ls /tmp/android-screenshots/*.png 2>/dev/null | head -1 > /dev/null; then
            cp /tmp/android-screenshots/*.png example/integration_test/golden/android/
            echo "Seeded $(ls /tmp/android-screenshots/*.png | wc -l | tr -d ' ') Android goldens."
            CHANGED=true
          fi

          if [ "$CHANGED" = "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add example/integration_test/golden/
            git commit -m "ci: seed golden baselines from integration test run [skip ci]"
            git push
          else
            echo "Goldens already exist or no screenshots were produced — nothing to seed."
          fi
