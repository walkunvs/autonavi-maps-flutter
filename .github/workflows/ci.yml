name: CI

on:
  push:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # iOS Simulator integration tests
  # Captures screenshots that are then committed as the new golden baseline.
  # ───────────────────────────────────────────────────────────────────────────
  integration_test_ios:
    name: Integration Tests (iOS Simulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub get && dart run melos bootstrap

      - name: Pod Install
        run: pod install
        working-directory: example/ios

      - name: Create and boot iOS Simulator
        run: |
          RUNTIME=$(xcrun simctl list runtimes --json \
            | python3 -c "
          import sys, json
          runtimes = json.load(sys.stdin)['runtimes']
          ios = [r for r in runtimes if r.get('isAvailable') and 'iOS' in r.get('name','')]
          print(ios[-1]['identifier'] if ios else '')
          ")
          if [ -z "$RUNTIME" ]; then
            echo "No available iOS runtime found" && exit 1
          fi
          UDID=$(xcrun simctl create "IntegrationTestDevice" "iPhone 15" "$RUNTIME")
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Run integration tests on iOS Simulator
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/map_rendering_test.dart \
            --device-id "$SIM_UDID" \
            --dart-define=AMAP_IOS_KEY=${{ secrets.AMAP_IOS_KEY }}
        working-directory: example
        env:
          SIM_UDID: ${{ env.SIM_UDID }}

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: ios-map-screenshots
          path: example/integration_test/screenshots/
          if-no-files-found: warn

      - name: Shutdown simulator
        if: always()
        run: |
          if [ -n "$SIM_UDID" ]; then
            xcrun simctl shutdown "$SIM_UDID" || true
            xcrun simctl delete "$SIM_UDID" || true
          fi
        env:
          SIM_UDID: ${{ env.SIM_UDID }}

  # ───────────────────────────────────────────────────────────────────────────
  # Android Emulator integration tests
  # ───────────────────────────────────────────────────────────────────────────
  integration_test_android:
    name: Integration Tests (Android Emulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub get && dart run melos bootstrap

      - name: Run integration tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: arm64-v8a
          profile: Nexus 6
          script: cd example && flutter drive --driver=test_driver/integration_test.dart --target=integration_test/map_rendering_test.dart -d emulator-5554 "--dart-define=AMAP_ANDROID_KEY=${{ secrets.AMAP_ANDROID_KEY }}"

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: android-map-screenshots
          path: example/integration_test/screenshots/
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────────────────
  # Update golden baselines
  #
  # Runs after both integration test jobs complete.  Always overwrites the
  # committed goldens with the screenshots from this run so that golden/
  # always reflects the latest state of main.
  # ───────────────────────────────────────────────────────────────────────────
  update_goldens:
    name: Update Golden Baselines
    runs-on: ubuntu-latest
    needs: [integration_test_ios, integration_test_android]
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Download iOS screenshots
        uses: actions/download-artifact@v4
        with:
          name: ios-map-screenshots
          path: /tmp/ios-screenshots/
        continue-on-error: true

      - name: Download Android screenshots
        uses: actions/download-artifact@v4
        with:
          name: android-map-screenshots
          path: /tmp/android-screenshots/
        continue-on-error: true

      - name: Overwrite goldens and commit
        run: |
          CHANGED=false

          if ls /tmp/ios-screenshots/*.png 2>/dev/null | head -1 > /dev/null; then
            cp /tmp/ios-screenshots/*.png example/integration_test/golden/ios/
            echo "Updated $(ls /tmp/ios-screenshots/*.png | wc -l | tr -d ' ') iOS goldens."
            CHANGED=true
          fi

          if ls /tmp/android-screenshots/*.png 2>/dev/null | head -1 > /dev/null; then
            cp /tmp/android-screenshots/*.png example/integration_test/golden/android/
            echo "Updated $(ls /tmp/android-screenshots/*.png | wc -l | tr -d ' ') Android goldens."
            CHANGED=true
          fi

          if [ "$CHANGED" = "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add example/integration_test/golden/
            git diff --cached --quiet || git commit -m "ci: update golden baselines [skip ci]" && git push
          else
            echo "No screenshots produced — goldens unchanged."
          fi
