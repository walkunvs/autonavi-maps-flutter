name: CI

on:
  push:
    branches: [main, develop]
  # pull_request CI is handled by pr-build-report.yml which also writes
  # error reports back to the PR branch. Keep this workflow for push only.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze_and_test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub get && dart run melos bootstrap

      - name: Analyze
        run: dart run melos run analyze

      - name: Test (unit + channel contract)
        run: dart run melos run test

      - name: Format check
        run: dart run melos run format_check

  android_build:
    name: Android Build
    runs-on: ubuntu-latest
    needs: analyze_and_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          cache: true

      - name: Install Melos
        run: dart pub get && dart run melos bootstrap

      - name: Build Android APK (example)
        run: flutter build apk --debug --dart-define=AMAP_API_KEY=${{ secrets.AMAP_API_KEY }}
        working-directory: example

  ios_build:
    name: iOS Build
    runs-on: macos-latest
    needs: analyze_and_test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          cache: true

      - name: Install Melos
        run: dart pub get && dart run melos bootstrap

      - name: Pod Install
        run: pod install
        working-directory: example/ios

      - name: Build iOS (no codesign)
        run: flutter build ios --debug --no-codesign --dart-define=AMAP_API_KEY=${{ secrets.AMAP_API_KEY }}
        working-directory: example

  # ───────────────────────────────────────────────────────────────────────────
  # Layer 2 + 3: iOS Simulator integration tests + golden screenshot regression
  #
  # Runs on macos-14 (Apple Silicon) because iOS Simulator requires macOS.
  # Screenshots are captured and compared against goldens in golden/.
  # ───────────────────────────────────────────────────────────────────────────
  integration_test_ios:
    name: Integration Tests (iOS Simulator)
    runs-on: macos-14
    needs: analyze_and_test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub get && dart run melos bootstrap

      - name: Pod Install
        run: pod install
        working-directory: example/ios

      - name: Create and boot iOS Simulator
        run: |
          # List available runtimes to pick a valid one.
          RUNTIME=$(xcrun simctl list runtimes --json \
            | python3 -c "
          import sys, json
          runtimes = json.load(sys.stdin)['runtimes']
          ios = [r for r in runtimes if r.get('isAvailable') and 'iOS' in r.get('name','')]
          print(ios[-1]['identifier'] if ios else '')
          ")
          if [ -z "$RUNTIME" ]; then
            echo "No available iOS runtime found" && exit 1
          fi
          UDID=$(xcrun simctl create "IntegrationTestDevice" "iPhone 15" "$RUNTIME")
          xcrun simctl boot "$UDID"
          # Wait for the simulator to finish booting.
          xcrun simctl bootstatus "$UDID" -b
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Run integration tests on iOS Simulator
        run: |
          flutter test integration_test/map_rendering_test.dart \
            --device-id "$SIM_UDID" \
            --dart-define=AMAP_IOS_KEY=${{ secrets.AMAP_IOS_KEY }}
        working-directory: example
        env:
          SIM_UDID: ${{ env.SIM_UDID }}

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-map-screenshots
          path: example/integration_test/screenshots/
          if-no-files-found: warn

      - name: Compare screenshots against goldens (Layer 3)
        if: always()
        run: |
          pip install pillow --break-system-packages
          python scripts/golden_diff.py \
            example/integration_test/golden \
            example/integration_test/screenshots \
            --threshold 2.0 \
            --diff-dir example/integration_test/diffs

      - name: Upload diff images on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ios-golden-diffs
          path: example/integration_test/diffs/
          if-no-files-found: ignore

      - name: Shutdown simulator
        if: always()
        run: |
          if [ -n "$SIM_UDID" ]; then
            xcrun simctl shutdown "$SIM_UDID" || true
            xcrun simctl delete "$SIM_UDID" || true
          fi
        env:
          SIM_UDID: ${{ env.SIM_UDID }}

  # ───────────────────────────────────────────────────────────────────────────
  # Layer 4: Android Emulator integration tests
  #
  # Runs on ubuntu-latest with KVM hardware acceleration for Android emulator.
  # ───────────────────────────────────────────────────────────────────────────
  integration_test_android:
    name: Integration Tests (Android Emulator)
    runs-on: ubuntu-latest
    needs: analyze_and_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub get && dart run melos bootstrap

      - name: Enable KVM hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          script: |
            cd example
            flutter test integration_test/map_rendering_test.dart \
              --device-id emulator-5554 \
              --dart-define=AMAP_ANDROID_KEY=${{ secrets.AMAP_ANDROID_KEY }}

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-map-screenshots
          path: example/integration_test/screenshots/
          if-no-files-found: warn

      - name: Compare screenshots against goldens (Layer 3)
        if: always()
        run: |
          pip install pillow --break-system-packages
          python scripts/golden_diff.py \
            example/integration_test/golden \
            example/integration_test/screenshots \
            --threshold 2.0 \
            --diff-dir example/integration_test/diffs

      - name: Upload diff images on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: android-golden-diffs
          path: example/integration_test/diffs/
          if-no-files-found: ignore
