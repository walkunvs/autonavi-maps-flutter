name: CI

on:
  push:
    branches: [main, develop]
  # pull_request CI is handled by pr-build-report.yml which also writes
  # error reports back to the PR branch. Keep this workflow for push only.

jobs:
  analyze_and_test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub get && dart run melos bootstrap

      - name: Analyze
        run: dart run melos run analyze

      - name: Test
        run: dart run melos run test

      - name: Format check
        run: dart run melos run format_check

  android_build:
    name: Android Build
    runs-on: ubuntu-latest
    needs: analyze_and_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          cache: true

      - name: Install Melos
        run: dart pub get && dart run melos bootstrap

      - name: Build Android APK (example)
        run: flutter build apk --debug --dart-define=AMAP_API_KEY=${{ secrets.AMAP_API_KEY }}
        working-directory: example

  ios_build:
    name: iOS Build
    runs-on: macos-latest
    needs: analyze_and_test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          cache: true

      - name: Install Melos
        run: dart pub get && dart run melos bootstrap

      - name: Pod Install
        run: pod install
        working-directory: example/ios

      - name: Build iOS (no codesign)
        run: flutter build ios --debug --no-codesign --dart-define=AMAP_API_KEY=${{ secrets.AMAP_API_KEY }}
        working-directory: example
