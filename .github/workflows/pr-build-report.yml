name: PR Build & Report

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Read-only: this workflow runs untrusted fork code, no write permissions
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Save PR metadata so the comment workflow knows which PR to update ─────
  save-pr-info:
    name: Save PR Info
    runs-on: ubuntu-latest
    steps:
      - name: Save PR number and head SHA
        run: |
          mkdir -p /tmp/pr-info
          echo "${{ github.event.pull_request.number }}" > /tmp/pr-info/pr_number
          echo "${{ github.event.pull_request.head.sha }}" > /tmp/pr-info/head_sha
      - uses: actions/upload-artifact@v6
        with:
          name: pr-info
          path: /tmp/pr-info/

  # ── 1. Flutter Analyze ────────────────────────────────────────────────────
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.analyze.outcome }}

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Melos bootstrap
        run: dart pub get && dart run melos bootstrap

      - name: Flutter Analyze
        id: analyze
        run: dart run melos exec -- "flutter analyze --no-fatal-infos" 2>&1 | tee /tmp/analyze.log; exit ${PIPESTATUS[0]}
        continue-on-error: true

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: log-analyze
          path: /tmp/analyze.log

  # ── 2. Android Build ──────────────────────────────────────────────────────
  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.build.outcome }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Melos bootstrap
        run: dart pub get && dart run melos bootstrap

      - name: Build Android APK (debug)
        id: build
        run: |
          flutter build apk --debug \
            --dart-define=AMAP_API_KEY=${{ secrets.AMAP_API_KEY || 'placeholder' }} \
            2>&1 | tee /tmp/android.log; exit ${PIPESTATUS[0]}
        working-directory: example
        env:
          AMAP_API_KEY: ${{ secrets.AMAP_API_KEY || 'placeholder' }}
        continue-on-error: true

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: log-android
          path: /tmp/android.log

  # ── 3. iOS Build ──────────────────────────────────────────────────────────
  ios-build:
    name: iOS Build
    runs-on: macos-latest
    outputs:
      # Use the explicit capture step so pod install failures report as
      # "failure" rather than "skipped" (steps.build.outcome is "skipped"
      # when a prior step fails without continue-on-error).
      status: ${{ steps.capture.outputs.status }}

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Melos bootstrap
        run: dart pub get && dart run melos bootstrap

      - name: Flutter pub get in example
        run: flutter pub get
        working-directory: example

      - name: Pod install
        id: pod_install
        run: pod install --repo-update 2>&1 | tee /tmp/ios.log; exit ${PIPESTATUS[0]}
        working-directory: example/ios
        continue-on-error: true

      - name: Build iOS (no codesign)
        id: build
        if: steps.pod_install.outcome == 'success'
        run: |
          flutter build ios --debug --no-codesign \
            --dart-define=AMAP_API_KEY=${{ secrets.AMAP_API_KEY || 'placeholder' }} \
            2>&1 | tee -a /tmp/ios.log; exit ${PIPESTATUS[0]}
        working-directory: example
        continue-on-error: true

      - name: Capture job status
        id: capture
        if: always()
        run: |
          if [[ "${{ steps.pod_install.outcome }}" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=${{ steps.build.outcome }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: log-ios
          path: /tmp/ios.log

  # ── 4. Save job results as artifact for comment workflow ──────────────────
  # Integration tests are skipped on PRs and only run after merge to main (ci.yml).
  # The comment workflow handles missing result files gracefully (shows ⏭️ skipped).
  save-results:
    name: Save Results
    runs-on: ubuntu-latest
    needs:
      - analyze
      - android-build
      - ios-build
    if: always()
    steps:
      - name: Write job results
        run: |
          mkdir -p /tmp/results
          echo "${{ needs.analyze.outputs.status }}"       > /tmp/results/analyze
          echo "${{ needs.android-build.outputs.status }}" > /tmp/results/android
          echo "${{ needs.ios-build.outputs.status }}"     > /tmp/results/ios
      - uses: actions/upload-artifact@v6
        with:
          name: job-results
          path: /tmp/results/
