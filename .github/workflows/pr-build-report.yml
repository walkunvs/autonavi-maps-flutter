name: PR Build & Report

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Read-only: this workflow runs untrusted fork code, no write permissions
permissions:
  contents: read

jobs:
  # ── Save PR metadata so the comment workflow knows which PR to update ─────
  save-pr-info:
    name: Save PR Info
    runs-on: ubuntu-latest
    steps:
      - name: Save PR number and head SHA
        run: |
          mkdir -p /tmp/pr-info
          echo "${{ github.event.pull_request.number }}" > /tmp/pr-info/pr_number
          echo "${{ github.event.pull_request.head.sha }}" > /tmp/pr-info/head_sha
      - uses: actions/upload-artifact@v4
        with:
          name: pr-info
          path: /tmp/pr-info/

  # ── 1. Flutter Analyze ────────────────────────────────────────────────────
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.analyze.outcome }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Melos bootstrap
        run: dart pub get && dart run melos bootstrap

      - name: Flutter Analyze
        id: analyze
        run: dart run melos run analyze 2>&1 | tee /tmp/analyze.log; exit ${PIPESTATUS[0]}
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: log-analyze
          path: /tmp/analyze.log

  # ── 2. Android Build ──────────────────────────────────────────────────────
  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.build.outcome }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Melos bootstrap
        run: dart pub get && dart run melos bootstrap

      - name: Recreate example platform files
        run: flutter create . --platforms android,ios
        working-directory: example

      - name: Build Android APK (debug)
        id: build
        run: |
          flutter build apk --debug \
            --dart-define=AMAP_API_KEY=${{ secrets.AMAP_API_KEY || 'placeholder' }} \
            2>&1 | tee /tmp/android.log; exit ${PIPESTATUS[0]}
        working-directory: example
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: log-android
          path: /tmp/android.log

  # ── 3. iOS Build ──────────────────────────────────────────────────────────
  ios-build:
    name: iOS Build
    runs-on: macos-latest
    outputs:
      status: ${{ steps.build.outcome }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Melos bootstrap
        run: dart pub get && dart run melos bootstrap

      - name: Recreate example platform files
        run: flutter create . --platforms android,ios
        working-directory: example

      - name: Flutter pub get in example
        run: flutter pub get
        working-directory: example

      - name: Pod install
        run: pod install
        working-directory: example/ios

      - name: Build iOS (no codesign)
        id: build
        run: |
          flutter build ios --debug --no-codesign \
            --dart-define=AMAP_API_KEY=${{ secrets.AMAP_API_KEY || 'placeholder' }} \
            2>&1 | tee /tmp/ios.log; exit ${PIPESTATUS[0]}
        working-directory: example
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: log-ios
          path: /tmp/ios.log

  # ── 4. Save job results as artifact for comment workflow ──────────────────
  save-results:
    name: Save Results
    runs-on: ubuntu-latest
    needs: [analyze, android-build, ios-build]
    if: always()
    steps:
      - name: Write job results
        run: |
          mkdir -p /tmp/results
          echo "${{ needs.analyze.outputs.status }}"       > /tmp/results/analyze
          echo "${{ needs.android-build.outputs.status }}" > /tmp/results/android
          echo "${{ needs.ios-build.outputs.status }}"     > /tmp/results/ios
      - uses: actions/upload-artifact@v4
        with:
          name: job-results
          path: /tmp/results/
