name: PR Build & Report

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Read-only: this workflow runs untrusted fork code, no write permissions
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Save PR metadata so the comment workflow knows which PR to update ─────
  save-pr-info:
    name: Save PR Info
    runs-on: ubuntu-latest
    steps:
      - name: Save PR number and head SHA
        run: |
          mkdir -p /tmp/pr-info
          echo "${{ github.event.pull_request.number }}" > /tmp/pr-info/pr_number
          echo "${{ github.event.pull_request.head.sha }}" > /tmp/pr-info/head_sha
      - uses: actions/upload-artifact@v6
        with:
          name: pr-info
          path: /tmp/pr-info/

  # ── 1. Flutter Analyze ────────────────────────────────────────────────────
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.analyze.outcome }}

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Melos bootstrap
        run: dart pub get && dart run melos bootstrap

      - name: Flutter Analyze
        id: analyze
        run: dart run melos exec -- "flutter analyze --no-fatal-infos" 2>&1 | tee /tmp/analyze.log; exit ${PIPESTATUS[0]}
        continue-on-error: true

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: log-analyze
          path: /tmp/analyze.log

  # ── 2. iOS Simulator Integration Tests ───────────────────────────────────
  integration_test_ios:
    name: Integration Tests (iOS Simulator)
    runs-on: macos-14
    outputs:
      status: ${{ steps.capture.outputs.status }}

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Install Melos
        id: melos
        run: dart pub get && dart run melos bootstrap
        continue-on-error: true

      - name: Pod Install
        id: pod_install
        if: steps.melos.outcome == 'success'
        run: pod install 2>&1 | tee /tmp/integration-ios.log; exit ${PIPESTATUS[0]}
        working-directory: example/ios
        continue-on-error: true

      - name: Create and boot iOS Simulator
        id: sim_boot
        if: steps.pod_install.outcome == 'success'
        run: |
          RUNTIME=$(xcrun simctl list runtimes --json \
            | python3 -c "
          import sys, json
          runtimes = json.load(sys.stdin)['runtimes']
          ios = [r for r in runtimes if r.get('isAvailable') and 'iOS' in r.get('name','')]
          print(ios[-1]['identifier'] if ios else '')
          ")
          if [ -z "$RUNTIME" ]; then
            echo "No available iOS runtime found" && exit 1
          fi
          UDID=$(xcrun simctl create "IntegrationTestDevice" "iPhone 15" "$RUNTIME")
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"
        continue-on-error: true

      - name: Run integration tests on iOS Simulator
        id: test
        if: steps.sim_boot.outcome == 'success'
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/map_rendering_test.dart \
            --device-id "$SIM_UDID" \
            --dart-define=AMAP_IOS_KEY=${{ secrets.AMAP_IOS_KEY }} \
            2>&1 | tee -a /tmp/integration-ios.log; exit ${PIPESTATUS[0]}
        working-directory: example
        env:
          SIM_UDID: ${{ env.SIM_UDID }}
        continue-on-error: true

      - name: Capture job status
        id: capture
        if: always()
        run: |
          if [[ "${{ steps.melos.outcome }}" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          elif [[ "${{ steps.pod_install.outcome }}" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          elif [[ "${{ steps.sim_boot.outcome }}" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=${{ steps.test.outcome }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: ios-map-screenshots
          path: example/integration_test/screenshots/
          if-no-files-found: warn

      - name: Shutdown simulator
        if: always()
        run: |
          if [ -n "$SIM_UDID" ]; then
            xcrun simctl shutdown "$SIM_UDID" || true
            xcrun simctl delete "$SIM_UDID" || true
          fi
        env:
          SIM_UDID: ${{ env.SIM_UDID }}

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: log-integration-ios
          path: /tmp/integration-ios.log
          if-no-files-found: ignore

  # ── 3. Android Emulator Integration Tests ────────────────────────────────
  integration_test_android:
    name: Integration Tests (Android Emulator)
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.capture.outputs.status }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Install Melos
        id: melos
        run: dart pub get && dart run melos bootstrap
        continue-on-error: true

      - name: Enable KVM hardware acceleration
        if: steps.melos.outcome == 'success'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests on Android Emulator
        id: test
        if: steps.melos.outcome == 'success'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          script: cd example && flutter drive --driver=test_driver/integration_test.dart --target=integration_test/map_rendering_test.dart -d emulator-5554 "--dart-define=AMAP_ANDROID_KEY=${{ secrets.AMAP_ANDROID_KEY }}" > /tmp/integration-android.log 2>&1
        continue-on-error: true

      - name: Capture job status
        id: capture
        if: always()
        run: |
          if [[ "${{ steps.melos.outcome }}" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=${{ steps.test.outcome }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: android-map-screenshots
          path: example/integration_test/screenshots/
          if-no-files-found: warn

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: log-integration-android
          path: /tmp/integration-android.log
          if-no-files-found: ignore

  # ── 4. Save job results as artifact for comment workflow ──────────────────
  save-results:
    name: Save Results
    runs-on: ubuntu-latest
    needs:
      - analyze
      - integration_test_ios
      - integration_test_android
    if: always()
    steps:
      - name: Write job results
        run: |
          mkdir -p /tmp/results
          echo "${{ needs.analyze.outputs.status }}"                        > /tmp/results/analyze
          echo "${{ needs.integration_test_ios.outputs.status }}"           > /tmp/results/integration_ios
          echo "${{ needs.integration_test_android.outputs.status }}"       > /tmp/results/integration_android
      - uses: actions/upload-artifact@v6
        with:
          name: job-results
          path: /tmp/results/
