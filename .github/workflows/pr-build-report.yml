name: PR Build & Report

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  # ── 1. Flutter Analyze ────────────────────────────────────────────────────
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.analyze.outcome }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Melos bootstrap
        run: dart pub get && dart run melos bootstrap

      - name: Flutter Analyze
        id: analyze
        run: dart run melos run analyze 2>&1 | tee /tmp/analyze.log; exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Upload analyze log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-analyze
          path: /tmp/analyze.log

  # ── 2. Android Build ──────────────────────────────────────────────────────
  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.build.outcome }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Melos bootstrap
        run: dart pub get && dart run melos bootstrap

      - name: Build Android APK (debug)
        id: build
        run: |
          flutter build apk --debug \
            --dart-define=AMAP_API_KEY=${{ secrets.AMAP_API_KEY || 'placeholder' }} \
            2>&1 | tee /tmp/android.log; exit ${PIPESTATUS[0]}
        working-directory: example
        continue-on-error: true

      - name: Upload android log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-android
          path: /tmp/android.log

  # ── 3. iOS Build ──────────────────────────────────────────────────────────
  ios-build:
    name: iOS Build
    runs-on: macos-latest
    outputs:
      status: ${{ steps.build.outcome }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Melos bootstrap
        run: dart pub get && dart run melos bootstrap

      - name: Flutter pub get in example
        run: flutter pub get
        working-directory: example

      - name: Pod install
        run: pod install
        working-directory: example/ios

      - name: Build iOS (no codesign)
        id: build
        run: |
          flutter build ios --debug --no-codesign \
            --dart-define=AMAP_API_KEY=${{ secrets.AMAP_API_KEY || 'placeholder' }} \
            2>&1 | tee /tmp/ios.log; exit ${PIPESTATUS[0]}
        working-directory: example
        continue-on-error: true

      - name: Upload ios log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-ios
          path: /tmp/ios.log

  # ── 4. Report: post / update a single PR comment ─────────────────────────
  report:
    name: Report Build Results
    runs-on: ubuntu-latest
    needs: [analyze, android-build, ios-build]
    if: always()

    steps:
      - name: Download all logs
        uses: actions/download-artifact@v4
        with:
          path: /tmp/ci-logs
        continue-on-error: true

      - name: Build and post PR comment
        uses: actions/github-script@v7
        env:
          ANALYZE_STATUS: ${{ needs.analyze.outputs.status }}
          ANDROID_STATUS: ${{ needs.android-build.outputs.status }}
          IOS_STATUS: ${{ needs.ios-build.outputs.status }}
        with:
          script: |
            const fs = require('fs');

            const jobs = [
              { label: 'Flutter Analyze', status: process.env.ANALYZE_STATUS, logFile: '/tmp/ci-logs/log-analyze/analyze.log' },
              { label: 'Android Build',   status: process.env.ANDROID_STATUS,  logFile: '/tmp/ci-logs/log-android/android.log' },
              { label: 'iOS Build',       status: process.env.IOS_STATUS,       logFile: '/tmp/ci-logs/log-ios/ios.log' },
            ];

            const icon = s => s === 'success' ? '✅' : s === 'failure' ? '❌' : '⏭️';
            const allPassed = jobs.every(j => j.status === 'success');

            // Status table
            let body = `<!-- ci-build-report -->\n## CI Build Report\n\n`;
            body += `| Job | Status |\n|-----|--------|\n`;
            for (const j of jobs) {
              body += `| ${j.label} | ${icon(j.status)} ${j.status ?? 'skipped'} |\n`;
            }
            body += `\n`;

            // Append error logs for failed jobs
            const failedJobs = jobs.filter(j => j.status === 'failure');
            if (failedJobs.length > 0) {
              body += `---\n### Error Details\n\n`;
              for (const j of failedJobs) {
                body += `<details>\n<summary>❌ ${j.label} — error log (last 100 lines)</summary>\n\n\`\`\`\n`;
                try {
                  const raw = fs.readFileSync(j.logFile, 'utf8');
                  const lines = raw.split('\n');
                  body += lines.slice(-100).join('\n');
                } catch {
                  body += '(log not available)';
                }
                body += `\n\`\`\`\n</details>\n\n`;
              }
            } else {
              body += `> ✅ All checks passed!\n`;
            }

            body += `\n**Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('<!-- ci-build-report -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
