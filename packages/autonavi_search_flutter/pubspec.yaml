name: autonavi_search_flutter
description: >-
  A Flutter plugin for AutoNavi (高德) search services on Android and iOS.
  Provides POI search, geocoding, and route planning.
version: 0.1.0
homepage: https://github.com/walkunvs/autonavi-maps-flutter
repository: https://github.com/walkunvs/autonavi-maps-flutter
issue_tracker: https://github.com/walkunvs/autonavi-maps-flutter/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.autonavi.search.flutter
        pluginClass: AutonaviSearchPlugin
      ios:
        pluginClass: AutonaviSearchPlugin
